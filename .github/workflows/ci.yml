name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Start Supabase
        run: npx supabase start

      - name: Export Supabase Env
        run: |
          npx supabase status -o env > supabase_env.txt
          echo "NEXT_PUBLIC_SUPABASE_URL=$(grep '^API_URL=' supabase_env.txt | cut -d '=' -f 2- | tr -d '\"')" >> .env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(grep '^ANON_KEY=' supabase_env.txt | cut -d '=' -f 2- | tr -d '\"')" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' supabase_env.txt | cut -d '=' -f 2- | tr -d '\"')" >> .env

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npm run test:e2e
